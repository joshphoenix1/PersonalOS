# /etc/nginx/sites-available/newsagg
# symlink into sites-enabled, then `sudo nginx -t && sudo systemctl reload nginx`.

server {
    listen 5080 default_server;
    server_name _;  # replace with your domain when TLS is added

    # API → uvicorn
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Static frontend (placeholder — frontend is a separate project).
    # When the site lands, point `root` at its build output.
    location / {
        root /opt/newsagg/public;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # Sensible logging & compression.
    access_log /var/log/nginx/newsagg.access.log;
    error_log  /var/log/nginx/newsagg.error.log;
    gzip on;
    gzip_types application/json text/css application/javascript text/html;
}
