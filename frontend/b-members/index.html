<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Members — News Aggregator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Spectral:wght@300;400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<style>
  :root {
    --bg: #F7F4EE;
    --card: #FFFDF8;
    --ink: #1A1613;
    --ink-2: #4A4440;
    --muted: #7A746D;
    --rule: #D9D2C6;
    --accent: #0C4B3F;
    --gold: #B08A3E;
    --up: #2C7A4B;
    --down: #B23A3A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--ink); }
  body { font-family: "Spectral", Georgia, serif; font-size: 16px; line-height: 1.5; min-height: 100vh; }
  a { color: inherit; text-decoration: none; border-bottom: 1px solid transparent; transition: border-color .15s; }
  a:hover { border-bottom-color: var(--gold); }
  .serif { font-family: "Cormorant Garamond", "Spectral", serif; }

  /* Masthead — newspaper style */
  header.masthead {
    padding: 44px 64px 22px;
    border-bottom: 2px solid var(--ink);
    text-align: center;
  }
  .masthead .eyebrow {
    font-family: "Spectral"; font-size: 11px; letter-spacing: .28em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 16px;
  }
  .masthead .wordmark {
    font-family: "Cormorant Garamond", serif;
    font-weight: 500; font-size: 64px; letter-spacing: -0.01em; line-height: 1;
  }
  .masthead .wordmark em { font-style: italic; color: var(--gold); }
  .masthead .dateline {
    margin-top: 16px; display: flex; justify-content: center; gap: 32px;
    font-size: 12px; letter-spacing: .18em; text-transform: uppercase; color: var(--muted);
  }
  .masthead .dateline span { border-left: 1px solid var(--rule); padding-left: 32px; }
  .masthead .dateline span:first-child { border-left: 0; padding-left: 0; }

  /* Weather inline strip */
  .wx-strip {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 22px;
    padding: 14px 24px; border-bottom: 1px solid var(--rule);
    font-family: "Spectral"; font-size: 13px; color: var(--ink-2);
  }
  .wx-strip .wx-item { display: inline-flex; gap: 8px; align-items: baseline; }
  .wx-strip .wx-item .c { font-family: "Cormorant Garamond", serif; font-weight: 500; font-size: 15px; }
  .wx-strip .wx-item .t { font-family: "Cormorant Garamond", serif; font-size: 18px; }
  .wx-strip .wx-item .s { color: var(--muted); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; }

  main { max-width: 1180px; margin: 0 auto; padding: 44px 48px 120px; }

  /* Hero */
  .hero {
    display: grid; grid-template-columns: 1.5fr 1fr; gap: 48px;
    padding-bottom: 44px; margin-bottom: 44px; border-bottom: 1px solid var(--rule);
  }
  .hero .kicker {
    font-family: "Spectral"; font-size: 11px; letter-spacing: .22em; text-transform: uppercase;
    color: var(--accent); font-weight: 500; margin-bottom: 14px;
  }
  .hero h1 {
    font-family: "Cormorant Garamond", serif; font-weight: 500; font-size: 52px; line-height: 1.08;
    letter-spacing: -0.012em; margin-bottom: 18px;
  }
  .hero h1 a { border-bottom: 0; }
  .hero .dek { font-size: 17px; line-height: 1.55; color: var(--ink-2); margin-bottom: 20px; max-width: 60ch; }
  .hero .byline { font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); }
  .hero .byline em { font-style: normal; color: var(--gold); font-weight: 600; }

  .hero-side { display: flex; flex-direction: column; gap: 22px; padding-left: 48px; border-left: 1px solid var(--rule); }
  .hero-side .label { font-family: "Spectral"; font-size: 11px; letter-spacing: .22em; text-transform: uppercase; color: var(--accent); font-weight: 500; margin-bottom: 4px; }
  .hero-side h3 { font-family: "Cormorant Garamond", serif; font-weight: 500; font-size: 22px; line-height: 1.18; }
  .hero-side .by { font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-top: 6px; }

  /* Section heading */
  h2.section {
    font-family: "Cormorant Garamond", serif;
    font-weight: 500; font-size: 28px; letter-spacing: -0.005em;
    padding-bottom: 12px; margin-bottom: 28px; border-bottom: 1px solid var(--ink);
    display: flex; justify-content: space-between; align-items: baseline;
  }
  h2.section .index { font-family: "Spectral"; font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); font-weight: 400; }

  /* Minor news: 2-column editorial */
  .minor {
    column-count: 2; column-gap: 48px; column-rule: 1px solid var(--rule);
    margin-bottom: 56px;
  }
  .minor article {
    break-inside: avoid; padding-bottom: 22px; margin-bottom: 22px; border-bottom: 1px solid var(--rule);
  }
  .minor .src { font-family: "Spectral"; font-size: 10px; letter-spacing: .22em; text-transform: uppercase; color: var(--gold); font-weight: 500; }
  .minor h4 { font-family: "Cormorant Garamond", serif; font-weight: 500; font-size: 22px; line-height: 1.18; margin: 6px 0 8px; }
  .minor p { font-size: 14.5px; line-height: 1.55; color: var(--ink-2); margin-bottom: 8px; }
  .minor .ts { font-family: "Spectral"; font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
  @media (max-width: 900px) { .minor { column-count: 1; } .hero { grid-template-columns: 1fr; } .hero-side { border-left: 0; padding-left: 0; border-top: 1px solid var(--rule); padding-top: 28px; } .masthead .wordmark { font-size: 44px; } }

  /* Markets sidebar */
  .markets-wrap { display: grid; grid-template-columns: repeat(3, 1fr); gap: 48px; margin-bottom: 40px; }
  .mkt-col h3 { font-family: "Cormorant Garamond", serif; font-weight: 500; font-size: 20px; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--rule); }
  .mkt-row { display: flex; justify-content: space-between; align-items: baseline; padding: 7px 0; border-bottom: 1px dashed var(--rule); font-family: "Spectral"; font-size: 13.5px; }
  .mkt-row .lbl { color: var(--ink); }
  .mkt-row .val { font-family: "Cormorant Garamond", serif; font-weight: 500; font-size: 15.5px; }
  .mkt-row .chg { font-size: 11px; letter-spacing: .05em; margin-left: 10px; }
  .mkt-row .chg.up { color: var(--up); }
  .mkt-row .chg.down { color: var(--down); }
  .mkt-row .chg.flat { color: var(--muted); }
  @media (max-width: 900px) { .markets-wrap { grid-template-columns: 1fr; } }

  footer {
    padding: 28px 48px 48px; border-top: 2px solid var(--ink); margin-top: 36px;
    display: flex; justify-content: space-between; font-family: "Spectral"; font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--muted);
  }
</style>
</head>
<body>

<header class="masthead">
  <div class="eyebrow">Private daily · Established 2026</div>
  <div class="wordmark">The Levant &amp; <em>Gulf</em></div>
  <div class="dateline">
    <span id="datestr">—</span>
    <span>Vol. I · Edition continuous</span>
  </div>
</header>

<div class="wx-strip" id="wxstrip"></div>

<main>
  <section class="hero" id="hero"></section>

  <h2 class="section">Further reading <span class="index" id="readcount">—</span></h2>
  <div class="minor" id="minor"></div>

  <h2 class="section">Markets at a glance</h2>
  <div class="markets-wrap" id="markets"></div>
</main>

<footer>
  <span>The Levant &amp; Gulf · Private circulation</span>
  <span><a href="../">Pick a different design</a></span>
</footer>

<script type="module">
import { loadSnapshot, fmtPct, fmtNum, relTime, errorBanner } from "../shared.js";

function cls(x) { return x > 0 ? "up" : x < 0 ? "down" : "flat"; }

function renderHero(majors) {
  const root = document.getElementById("hero");
  if (!majors.length) { root.innerHTML = "<p style='color:#7A746D'>The morning's edition is being prepared.</p>"; return; }
  const [lead, ...rest] = majors;
  root.innerHTML = `
    <div>
      <div class="kicker">Lead · ${lead.region.replace("_"," ")}</div>
      <h1><a href="${lead.url}" target="_blank" rel="noopener">${lead.title}</a></h1>
      <p class="dek">${lead.summary || ""}</p>
      <div class="byline">From <em>${lead.source}</em> · ${relTime(lead.published_at || lead.fetched_at)}</div>
    </div>
    <aside class="hero-side">
      ${rest.slice(0,4).map(s => `
        <div>
          <div class="label">${s.region.replace("_"," ")}</div>
          <h3><a href="${s.url}" target="_blank" rel="noopener">${s.title}</a></h3>
          <div class="by">${s.source} · ${relTime(s.published_at || s.fetched_at)}</div>
        </div>
      `).join("")}
    </aside>`;
}

function renderMinor(items) {
  const show = items.slice(0, 14);
  document.getElementById("readcount").textContent = `${show.length} stories`;
  document.getElementById("minor").innerHTML = show.map(s => `
    <article>
      <div class="src">${s.source}</div>
      <h4><a href="${s.url}" target="_blank" rel="noopener">${s.title}</a></h4>
      <p>${(s.summary || "").slice(0, 180)}${(s.summary||"").length > 180 ? "…" : ""}</p>
      <div class="ts">${relTime(s.published_at || s.fetched_at)}</div>
    </article>`).join("");
}

function renderMarkets(all) {
  const col = (title, items) => `
    <div class="mkt-col">
      <h3>${title}</h3>
      ${items.map(q => `
        <div class="mkt-row">
          <span class="lbl">${q.label}</span>
          <span><span class="val">${fmtNum(q.price)}</span>
            <span class="chg ${cls(q.change_pct)}">${fmtPct(q.change_pct)}</span></span>
        </div>`).join("")}
    </div>`;
  document.getElementById("markets").innerHTML =
    col("Commodities", all.commodity) + col("Indices", all.index) + col("Currencies", all.fx);
}

function renderWx(cities) {
  document.getElementById("wxstrip").innerHTML = cities.map(c => `
    <span class="wx-item"><span class="c">${c.city}</span>
      <span class="t">${c.temp_c?.toFixed(0) ?? "—"}°</span>
      <span class="s">${c.summary || ""}</span></span>`).join("");
}

(async () => {
  try {
    const data = await loadSnapshot();
    document.getElementById("datestr").textContent =
      new Date(data.generated_at).toLocaleDateString(undefined, {weekday:"long",year:"numeric",month:"long",day:"numeric"});
    renderWx(data.weather);
    renderHero(data.major_news);
    renderMinor(data.minor_news);
    renderMarkets(data.markets);
  } catch (e) {
    document.body.prepend(errorBanner(e));
  }
})();
</script>
</body>
</html>
